{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="flex-center" style="min-height: 70vh;">
    <div class="glass-panel" style="max-width: 500px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Coder Login</h2>
            <p style="color: var(--text-muted);">Welcome back to the arena.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.rollno.id_for_label }}">Roll No</label>
                <input type="text" name="{{ form.rollno.name }}" id="{{ form.rollno.id_for_label }}"
                    class="form-control" required>
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Password</label>
                <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}"
                    class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Enter Arena</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'coder_register' %}" style="color: var(--primary);">Register
                instead</a>
        </div>
    </div>
</div>
{% endblock %}
