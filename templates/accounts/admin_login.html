{% extends 'base.html' %}

{% block content %}
<div class="flex-center" style="min-height: 70vh;">
    <div class="glass-panel" style="max-width: 500px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Admin Secure Login</h2>
            <p style="color: var(--text-muted);">Please enter your registered credentials.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.name.id_for_label }}">Registered Name</label>
                <input type="text" name="{{ form.name.name }}" id="{{ form.name.id_for_label }}"
                    class="form-control" required>
            </div>

            <div class="form-group">
                <label for="{{ form.email.id_for_label }}">Registered Email ID</label>
                <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}" class="form-control"
                    required>
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Password</label>
                <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}"
                    class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Admin Auth -> Access
                Portal</button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            New Admin? <a href="{% url 'admin_register' %}" style="color: var(--primary);">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
