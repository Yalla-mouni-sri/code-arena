{% extends 'base.html' %}

{% block content %}
<div class="flex-center" style="min-height: 70vh;">
    <div class="glass-panel" style="max-width: 500px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>👑 Super Admin Login</h2>
            <p style="color: var(--text-muted);">Secure access for the primary system administrator.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_name">Name</label>
                <input type="text" name="name" id="id_name" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="id_email">Email ID</label>
                <input type="email" name="email" id="id_email" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; background: #fbbf24; color: #000;">Login as Super Admin</button>
        </form>
    </div>
</div>
{% endblock %}
